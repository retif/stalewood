# GoReleaser config — https://goreleaser.com
version: 2

project_name: stalewood

before:
  hooks:
    - go test ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - CLAUDE.md

nfpms:
  - package_name: stalewood
    vendor: Oleks Kuksenko
    homepage: "https://github.com/retif/stalewood"
    maintainer: "Oleks Kuksenko <oleks.kuksenko@gmail.com>"
    description: "Find and reap merged git worktrees."
    license: MIT
    section: utils
    formats:
      - deb
      - rpm

snapcrafts:
  - name: stalewood
    title: stalewood
    summary: Find and reap merged git worktrees
    description: |
      stalewood scans a directory tree for git worktrees and reports which
      ones are safe to delete - work already integrated into another branch -
      and can prune them. A --lint mode fits into a git hook.
    grade: stable
    confinement: classic
    license: MIT
    base: core24
    publish: false
    apps:
      stalewood:
        command: stalewood

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    signature: "${artifact}.bundle"
    artifacts: checksum
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge "

release:
  extra_files:
    - glob: dist/*.snap

brews:
  - repository:
      owner: retif
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/retif/stalewood"
    description: "Find and reap merged git worktrees"
    license: MIT
    test: |
      system "#{bin}/stalewood", "--version"
