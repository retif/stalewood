# GoReleaser config — https://goreleaser.com
version: 2

project_name: stalewood

before:
  hooks:
    - go test ./...

builds:
  - env:
      - CGO_ENABLED=0
    # Unix only: the stale-lock PID check uses syscall.Kill, not on Windows.
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    files:
      - README.md
      - LICENSE
      - CLAUDE.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge "
